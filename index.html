<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>タップ記録</title>

<link rel="manifest" href="manifest.json">
<style><link rel="apple-touch-icon" href="icon.png">
*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}

body{

    font-family:-apple-system,BlinkMacSystemFont,sans-serif;

    min-height:100vh;

    background:linear-gradient(

        180deg,

        #009dff 0%,

        #00b7ff 40%,

        #00cfff 100%

    );

    color:white;

    text-align:center;

}

.container{

    width:100%;

    max-width:500px;

    margin:auto;

    padding:40px 25px;

}

.title{

    margin-top:30px;

    font-size:54px;

    font-weight:900;

}

.countTitle{

    margin-top:50px;

    font-size:28px;

    font-weight:700;

}

.count{

    font-size:90px;

    font-weight:900;

    margin-top:10px;

}

.tapButton{

    width:280px;

    height:280px;

    border-radius:50%;

    margin:60px auto 50px;

    background:linear-gradient(

        180deg,

        #163dff,

        #003cff

    );

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:72px;

    font-weight:900;

    border:8px solid white;

    box-shadow:

        0 25px 50px rgba(0,0,0,0.25),

        0 0 40px rgba(255,255,255,0.3);

    transition:0.1s;

}

.tapButton:active{

    transform:scale(0.95);

}

.buttons{

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:20px;

}

.whiteButton{

    width:300px;

    height:70px;

    border-radius:40px;

    border:3px solid white;

    background:transparent;

    color:white;

    font-size:28px;

    font-weight:700;

}

.redButton{

    width:300px;

    height:75px;

    border:none;

    border-radius:40px;

    background:linear-gradient(

        180deg,

        #ff4d5a,

        #ff2033

    );

    color:white;

    font-size:30px;

    font-weight:800;

    box-shadow:

        0 10px 25px rgba(255,0,0,0.35);

}

.history{

    margin-top:40px;

    background:rgba(255,255,255,0.12);

    border-radius:25px;

    padding:20px;

    max-height:250px;

    overflow:auto;

    text-align:left;

}

.record{

    padding:12px 0;

    border-bottom:1px solid rgba(255,255,255,0.2);

    font-size:18px;

}

.footer{

    margin-top:50px;

    font-size:18px;

    opacity:0.9;

}

</style>

</head>

<body>

<div class="container">

    <div class="title">

        タップ記録

    </div>

    <div class="countTitle">

        タップ回数

    </div>

    <div class="count" id="count">

        0

    </div>

    <div class="tapButton" id="tapButton">

        TAP

    </div>

    <div class="buttons">

        <button class="whiteButton" onclick="showStats()">

            📊 統計を見る

        </button>

        <button class="redButton" onclick="clearData()">

            🗑 全データ削除

        </button>

    </div>

    <div class="history" id="history"></div>

    <div class="footer">

        タップ記録は自動保存されます

    </div>

</div>

<script>

let records =

JSON.parse(localStorage.getItem("tapRecords")) || [];

function updateScreen(){

    document.getElementById("count").innerText =

    records.length;

    const history =

    document.getElementById("history");

    history.innerHTML = "";

    records.slice().reverse().forEach(record=>{

        const div =

        document.createElement("div");

        div.className = "record";

        div.innerText = record;

        history.appendChild(div);

    });

}

document.getElementById("tapButton")

.onclick = ()=>{

    const now = new Date();

    const text =

    now.toLocaleDateString() +

    " " +

    now.toLocaleTimeString();

    records.push(text);

    localStorage.setItem(

        "tapRecords",

        JSON.stringify(records)

    );

    updateScreen();

};

function clearData(){

    if(confirm("全データ削除しますか？")){

        records = [];

        localStorage.removeItem("tapRecords");

        updateScreen();

    }

}

function showStats(){

    alert(

        "総タップ数: " +

        records.length +

        "回"

    );

}

updateScreen();

if ('serviceWorker' in navigator) {

    navigator.serviceWorker.register('sw.js');

}

</script>

</body>

</html>
